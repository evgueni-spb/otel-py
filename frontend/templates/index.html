<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Auth Validation</title>
<style>body{font-family:system-ui,sans-serif;padding:2rem;max-width:400px;margin:0 auto;}
form{display:flex;flex-direction:column;gap:0.8rem;}input,button{padding:0.6rem;border:1px solid #ccc;border-radius:4px;}
button{background:#007bff;color:white;cursor:pointer;}button:hover{background:#0056b3;}
.result{margin-top:1rem;padding:0.5rem;border-radius:4px;text-align:center;}
.success{background:#d4edda;color:#155724;} .error{background:#f8d7da;color:#721c24;}</style></head>
<body>
  <h2>🔐 User Validation Portal</h2>
  <form method="post" action="/validate">
    <label>Username:</label><input type="text" name="username" value="{{ username or '' }}" required>
    <label>Password:</label><input type="password" name="password" required>
    <button type="submit">Validate</button>
  </form>
  {% if result %}<p class="result {{ 'success' if 'success' in result else 'error' }}">{{ result }}</p>{% endif %}
</body>
</html>
