global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'frontend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['frontend:8000']

  - job_name: 'fluentbit_metrics'
    metrics_path: '/api/v1/metrics/prometheus'
    static_configs:
      - targets: ['fluentbit:2021']