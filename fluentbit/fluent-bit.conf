[SERVICE]
    Flush           1
    Daemon          Off
    Log_Level       info
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

# Receive OTLP traces via HTTP on port 4318 (internal only)
[INPUT]
    Name            opentelemetry
    Listen          0.0.0.0
    Http_Port       4318
    Tag             otlp

# Forward traces to Jaeger via HTTP (preserves service.name reliably)
[OUTPUT]
    Name            opentelemetry
    Match           otlp.traces
    Host            jaeger
    Port            4318
    Traces_uri      /v1/traces
    Log_response_payload On

# Logs to stdout for debugging
[OUTPUT]
    Name            stdout
    Match           otlp.logs
    Format          json_lines