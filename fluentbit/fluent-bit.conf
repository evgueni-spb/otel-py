[SERVICE]
    Flush           1
    Daemon          Off
    Log_Level       info
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020

[INPUT]
    Name            opentelemetry
    Listen          0.0.0.0
    Port            4318
    Tag             otlp

[OUTPUT]
    Name            stdout
    Match           otlp.logs.*
    Format          json_lines

[OUTPUT]
    Name            prometheus_exporter
    Match           otlp.metrics.*
    Host            0.0.0.0
    Port            2021